<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Refúgio da Gaby ❤️</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;overflow:hidden;background:linear-gradient(#07152d,#173d6a);color:#fff}
#sky{position:fixed;inset:0}
#ui{position:relative;z-index:2;height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:rgba(255,255,255,.12);backdrop-filter:blur(12px);padding:28px;border-radius:24px;max-width:720px;width:92%;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.35)}
h1{margin-top:0}.btn{padding:12px 20px;border:none;border-radius:999px;cursor:pointer}
.hidden{display:none}
.float{position:absolute;padding:8px 12px;background:rgba(255,255,255,.16);border-radius:14px;cursor:pointer;animation:float 4s ease-in-out infinite}
@keyframes float{50%{transform:translateY(-10px)}}
#popup{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:5}
#popup .box{background:#ffffffee;color:#123;padding:22px;border-radius:18px;max-width:420px;text-align:center}
#progress{margin-top:12px}
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div id="ui">
<div class="card">
<h1>Para Gaby 🤍</h1>
<p id="intro">Meu amor, este pequeno universo foi feito para te lembrar que você merece paz, descanso e muito carinho.</p>
<button class="btn" id="start">Entrar ✨</button>
<div id="game" class="hidden">
<p>Encontre as <b>10 mensagens escondidas</b> clicando nas luzes que aparecem.</p>
<div id="progress">0/10 descobertas ❤️</div>
</div>
</div>
</div>
<div id="popup"><div class="box"><h2>💌</h2><p id="msg"></p><button class="btn" onclick="popup.style.display='none'">Continuar</button></div></div>
<script>
const c=document.getElementById("sky"),x=c.getContext("2d");
function rs(){c.width=innerWidth;c.height=innerHeight}rs();onresize=rs;
const stars=[...Array(180)].map(()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2}));
(function a(){x.clearRect(0,0,c.width,c.height);stars.forEach(s=>{x.fillStyle="rgba(255,255,255,"+(0.4+Math.random()*0.6)+")";x.beginPath();x.arc(s.x,s.y,s.r,0,7);x.fill()});requestAnimationFrame(a)})();
const texts=[
"Você merece descansar.",
"Tenho muito orgulho de você.",
"Seu sorriso ilumina meus dias.",
"Respire... eu estou torcendo por você.",
"Você é mais forte do que imagina.",
"Seu coração é lindo.",
"Obrigado por existir.",
"Mesmo cansada, você continua incrível.",
"Você nunca está sozinha.",
"Eu te amo mais do que consigo explicar. ❤️"
];
let found=0;
start.onclick=()=>{
start.remove();
game.classList.remove("hidden");
for(let i=0;i<10;i++){
let d=document.createElement("div");
d.className="float";
d.style.left=(8+Math.random()*82)+"vw";
d.style.top=(10+Math.random()*75)+"vh";
d.textContent="✨";
d.onclick=()=>{
msg.textContent=texts[i];
popup.style.display="flex";
d.remove();
found++;
progress.textContent=found+"/10 descobertas ❤️";
if(found===10){
setTimeout(()=>{msg.innerHTML="<b>Parabéns, Gaby.</b><br><br>Você encontrou todas as mensagens. Espero que este pequeno lugar tenha deixado seu dia um pouco mais leve. Eu quero que você sempre se lembre: você é muito especial para mim. Eu te amo. ❤️";popup.style.display="flex";},300);
}
};
document.body.appendChild(d);
}
}
</script>
</body>
</html>
